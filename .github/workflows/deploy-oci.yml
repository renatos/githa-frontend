name: Deploy Frontend to OCI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: npm run build
      
      - name: Copy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          source: "dist/*,nginx.conf"
          target: "/tmp/githa-frontend-deploy"
      
      - name: Deploy and restart Nginx
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Criar diretório do frontend se não existir
            sudo mkdir -p /var/www/githa
            
            # Limpar arquivos antigos
            sudo rm -rf /var/www/githa/*
            
            # Mover arquivos do deploy
            # Como enviamos sem strip_components, os arquivos do site estão em /tmp/githa-frontend-deploy/dist/
            if [ -d "/tmp/githa-frontend-deploy/dist" ]; then
                sudo mv /tmp/githa-frontend-deploy/dist/* /var/www/githa/
            fi
            
            # Mover configuração do Nginx para o local padrão
            if [ -f "/tmp/githa-frontend-deploy/nginx.conf" ]; then
                sudo mv /tmp/githa-frontend-deploy/nginx.conf /etc/nginx/sites-available/default
            fi
            
            sudo rm -rf /tmp/githa-frontend-deploy
            
            # Ajustar permissões
            sudo chown -R www-data:www-data /var/www/githa
            sudo chmod -R 755 /var/www/githa
            
            # Testar configuração do Nginx e recarregar
            sudo nginx -t && sudo systemctl reload nginx
            
            echo "Frontend and Nginx config deployed successfully!"

